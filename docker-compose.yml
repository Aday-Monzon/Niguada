services:
  postgres:
    image: postgres:16-alpine
    container_name: niguada-postgres
    environment:
      POSTGRES_DB: niguada
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d niguada"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: niguada-backend
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/niguada
      JWT_SECRET: change-me-super-secret
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    container_name: niguada-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
